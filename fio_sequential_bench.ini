[global]

# IO engine portable across Linux / FreeBSD / illumos
ioengine=sync

# sequential write workload
rw=write

# large blocks typical for storage benchmarks
bs=1M

# bypass page cache on platforms that support it (Linux, FreeBSD, illumos).
# macOS does not support O_DIRECT on HFS+/APFS; bench.sh overrides this to
# direct=0 at runtime on Darwin via a temporary copy of this file.
direct=1

# avoid compressibility issues
buffer_pattern=0xdeadbeef

# ensure data actually reaches storage
fsync_on_close=1

# O_SYNC: block each write syscall until data is committed to the filesystem.
# On macOS this is the most effective substitute for direct=1, preventing the
# page cache from inflating results — especially on the ramdisk where fsync
# is otherwise a no-op.  On Linux/FreeBSD direct=1 already bypasses the cache
# so sync=1 is redundant but harmless.
sync=1

# flush any remaining writeback at the end of each job, ensuring fio's
# recorded time includes the cost of draining the write queue.
end_fsync=1

# single thread to measure latency effects
numjobs=4

# overwrite files each run
overwrite=1

# runtime control
time_based=0

group_reporting=1


[job]
